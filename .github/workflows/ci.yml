name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.30"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked --group dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.30"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked --group dev
      - name: Mypy
        run: uv run mypy src/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.30"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked --group dev
      - name: Bandit
        run: uv run bandit -c pyproject.toml -r src/
      - name: Detect secrets
        run: uv run detect-secrets scan --baseline .secrets.baseline || true

  test:
    name: Tests (coverage >= 85%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.30"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: uv sync --locked --group dev
      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=swingrl --cov-report=term-missing --cov-fail-under=85
