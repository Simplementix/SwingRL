# docker-compose.yml — Production deployment for homelab paper trading.
#
# Uses the multi-stage Dockerfile 'production' target (excludes dev deps).
# Intended for homelab deployment with TRADING_MODE=paper.
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
#
# Required .env file with:
#   ALPACA_API_KEY=...
#   ALPACA_SECRET_KEY=...
#   DISCORD_WEBHOOK_URL=...

services:
  swingrl-ollama:
    container_name: swingrl-ollama
    image: ollama/ollama:latest
    # No memory or CPU limits — dedicated inference for epoch advice.
    # qwen3:1.7b uses ~1.5 GB RAM. Let the OS manage resources.
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "127.0.0.1:11435:11434"    # Different host port to avoid ragflow conflict
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  swingrl-memory:
    container_name: swingrl-memory
    build:
      context: ./services/memory
      dockerfile: Dockerfile
    # Port exposed to host for validation scripts and operator curl commands.
    ports:
      - "127.0.0.1:8889:8889"
    # 1 GB RAM / 1 CPU for consolidation workload headroom. Soft limit, shared CPUs.
    mem_limit: 1g
    cpus: 1.0
    env_file: .env
    volumes:
      - ./db:/app/db
      - ./data:/app/data
      - ./config:/app/config
    healthcheck:
      test: ["CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8889/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  swingrl:
    container_name: swingrl
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    # No mem_limit — swingrl is the primary workload on 64 GB homelab.
    # Other containers use ~1.5 GB (memory 1G + dashboard 0.5G).
    # SAC replay buffer (500K × n_envs=6) + 36 SubprocVecEnv fork workers
    # peak ~12-15 GB during training. Let the OS manage memory.
    cpus: 10.0
    # Secrets: loaded from .env on the host; never baked into the image.
    env_file: .env
    environment:
      - SWINGRL_TRADING_MODE=paper
      - TZ=America/New_York
    # Bind mounts: data persists on the host across container restarts.
    # Paths match trader user's /app working directory inside the container.
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./models:/app/models
      - ./logs:/app/logs
      - ./config:/app/config
      - ./status:/app/status
    depends_on:
      swingrl-memory:
        # Soft dependency: memory agent is optional; app handles unavailability gracefully
        condition: service_started
    restart: unless-stopped

  swingrl-dashboard:
    container_name: swingrl-dashboard
    build:
      context: .
      dockerfile: dashboard/Dockerfile.dashboard
    mem_limit: 512m
    cpus: 0.5
    environment:
      - SWINGRL_DB_DIR=/app/db
      - TZ=America/New_York
    volumes:
      - ./db:/app/db:ro        # Read-only access to databases
      - ./models:/app/models:ro  # Read-only for model metadata
    ports:
      - "8501:8501"
    restart: unless-stopped
    depends_on:
      - swingrl

volumes:
  ollama_data:    # Named volume for Ollama model persistence across container restarts
