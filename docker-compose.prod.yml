# docker-compose.prod.yml — Production deployment for homelab paper trading.
#
# Uses the multi-stage Dockerfile 'production' target (excludes dev deps).
# Intended for homelab deployment with TRADING_MODE=paper.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
#
# Required .env file with:
#   ALPACA_API_KEY=...
#   ALPACA_SECRET_KEY=...
#   DISCORD_WEBHOOK_URL=...

services:
  swingrl-ollama:
    image: ollama/ollama
    # 24 GB RAM / 8 CPUs for qwen3:14b (requires ~10 GB VRAM/RAM).
    # Adjust mem_limit if homelab has different RAM allocation.
    mem_limit: 24g
    cpus: 8.0
    volumes:
      # Named volume persists model weights across container restarts.
      # Models are pulled once by scripts/setup_ollama.sh (idempotent).
      - ollama_models:/root/.ollama
    healthcheck:
      # Ollama image includes neither curl nor wget — use the ollama CLI.
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    # No host port — accessed via internal Docker DNS as swingrl-ollama:11434.

  swingrl-memory:
    build:
      context: ./services/memory
      dockerfile: Dockerfile
    # Port exposed to host for validation scripts and operator curl commands.
    ports:
      - "8889:8889"
    mem_limit: 512m
    cpus: 0.5
    env_file: .env
    volumes:
      - ./db:/app/db
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      swingrl-ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8889/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  swingrl:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    # Resource limits — homelab has 8 GB RAM / 4 cores; cap at 2.5 GB / 1 CPU
    # to leave headroom for the host OS and other services.
    mem_limit: 2.5g
    cpus: 1.0
    # Secrets: loaded from .env on the host; never baked into the image.
    env_file: .env
    environment:
      - SWINGRL_TRADING_MODE=paper
      - TZ=America/New_York
    # Bind mounts: data persists on the host across container restarts.
    # Paths match trader user's /app working directory inside the container.
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./models:/app/models
      - ./logs:/app/logs
      - ./config:/app/config
      - ./status:/app/status
    depends_on:
      swingrl-memory:
        condition: service_healthy
    restart: unless-stopped

  swingrl-dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile.dashboard
    mem_limit: 512m
    cpus: 0.5
    environment:
      - SWINGRL_DB_DIR=/app/db
      - TZ=America/New_York
    volumes:
      - ./db:/app/db:ro        # Read-only access to databases
      - ./models:/app/models:ro  # Read-only for model metadata
    ports:
      - "8501:8501"
    restart: unless-stopped
    depends_on:
      - swingrl

volumes:
  # Named volume for Ollama model weights — persists across container restarts.
  # Models survive `docker compose down` but not `docker compose down --volumes`.
  ollama_models:
