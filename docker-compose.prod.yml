# docker-compose.prod.yml — Production deployment for homelab paper trading.
#
# Uses the multi-stage Dockerfile 'production' target (excludes dev deps).
# Intended for homelab deployment with TRADING_MODE=paper.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#   docker compose -f docker-compose.prod.yml down
#
# Required .env file with:
#   ALPACA_API_KEY=...
#   ALPACA_SECRET_KEY=...
#   DISCORD_WEBHOOK_URL=...

services:
  swingrl-ollama:
    container_name: swingrl-ollama
    image: ollama/ollama
    # 4 GB RAM / 4 CPUs for qwen2.5:3b (~2.4 GB). qwen3:14b moved to cloud API.
    # Hard-pinned to P-cores 0-3 (4 HT threads) for <3s inference during
    # concurrent retrain + live trading.
    mem_limit: 4g
    cpus: 4.0
    cpuset: "0-3"
    volumes:
      # Named volume persists model weights across container restarts.
      # Models are pulled once by scripts/setup_ollama.sh (idempotent).
      - ollama_models:/root/.ollama
    healthcheck:
      # Ollama image includes neither curl nor wget — use the ollama CLI.
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    # No host port — accessed via internal Docker DNS as swingrl-ollama:11434.

  swingrl-memory:
    container_name: swingrl-memory
    build:
      context: ./services/memory
      dockerfile: Dockerfile
    # Port exposed to host for validation scripts and operator curl commands.
    ports:
      - "127.0.0.1:8889:8889"
    # 1 GB RAM / 1 CPU for consolidation workload headroom. Soft limit, shared CPUs.
    mem_limit: 1g
    cpus: 1.0
    env_file: .env
    volumes:
      - ./db:/app/db
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      swingrl-ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8889/health\")'"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  swingrl:
    container_name: swingrl
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    # No mem_limit — swingrl is the primary workload on 64 GB homelab.
    # Other containers use ~5.5 GB (Ollama 4G + memory 1G + dashboard 0.5G).
    # SAC replay buffer (500K × n_envs=6) + 36 SubprocVecEnv fork workers
    # peak ~12-15 GB during training. Let the OS manage memory.
    cpus: 8.0
    # Secrets: loaded from .env on the host; never baked into the image.
    env_file: .env
    environment:
      - SWINGRL_TRADING_MODE=paper
      - TZ=America/New_York
    # Bind mounts: data persists on the host across container restarts.
    # Paths match trader user's /app working directory inside the container.
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./models:/app/models
      - ./logs:/app/logs
      - ./config:/app/config
      - ./status:/app/status
    depends_on:
      swingrl-memory:
        # Soft dependency: memory agent is optional; app handles unavailability gracefully
        condition: service_started
    restart: unless-stopped

  swingrl-dashboard:
    container_name: swingrl-dashboard
    build:
      context: .
      dockerfile: dashboard/Dockerfile.dashboard
    mem_limit: 512m
    cpus: 0.5
    environment:
      - SWINGRL_DB_DIR=/app/db
      - TZ=America/New_York
    volumes:
      - ./db:/app/db:ro        # Read-only access to databases
      - ./models:/app/models:ro  # Read-only for model metadata
    ports:
      - "8501:8501"
    restart: unless-stopped
    depends_on:
      - swingrl

volumes:
  # Named volume for Ollama model weights — persists across container restarts.
  # Models survive `docker compose down` but not `docker compose down --volumes`.
  ollama_models:
