# config/swingrl.yaml — SwingRL development defaults
# Override any field with SWINGRL_ env var prefix.
# Nested fields use double-underscore: SWINGRL_EQUITY__MAX_POSITION_SIZE=0.30
# Load via: from swingrl.config.schema import load_config; cfg = load_config()

trading_mode: paper  # "paper" | "live"

equity:
  symbols: [SPY, QQQ, VTI, XLV, XLI, XLE, XLF, XLK]
  hmm_proxy_symbol: SPY         # market proxy for HMM regime detection (must be in symbols)
  max_position_size: 0.25       # max fraction of equity capital in one ETF position
  max_drawdown_pct: 0.10        # circuit breaker: halt equity env at 10% DD
  daily_loss_limit_pct: 0.02    # circuit breaker: halt equity env at 2% daily loss
  min_order_usd: 1.0            # Alpaca minimum order floor ($1.00 fractional shares)

crypto:
  symbols: [BTCUSDT, ETHUSDT]
  hmm_proxy_symbol: BTCUSDT     # market proxy for HMM regime detection (must be in symbols)
  max_position_size: 0.50       # BTC can be up to 50% of crypto capital
  max_drawdown_pct: 0.12        # circuit breaker: halt crypto env at 12% DD
  daily_loss_limit_pct: 0.03    # circuit breaker: halt crypto env at 3% daily loss
  min_order_usd: 10.0           # Binance.US minimum order floor ($10.00)

capital:
  equity_usd: 400.0             # initial equity environment capital (USD)
  crypto_usd: 47.0              # initial crypto environment capital (USD)

paths:
  data_dir: data/
  db_dir: db/
  models_dir: models/
  logs_dir: logs/

logging:
  level: INFO                   # DEBUG | INFO | WARNING | ERROR
  json_logs: false              # true in production/Docker (SWINGRL_LOGGING__JSON_LOGS=true)

environment:
  initial_amount: 100000.0               # $100K normalized training capital (both envs)
  equity_episode_bars: 252               # equity episode length (trading days)
  crypto_episode_bars: 540               # crypto episode length (4H bars ~3 months)
  equity_transaction_cost_pct: 0.0006    # 0.06% round-trip (spread + slippage)
  crypto_transaction_cost_pct: 0.0022    # 0.22% round-trip (commission + spread + slippage)
  signal_deadzone: 0.02                  # hold threshold: suppress weight changes < 2%
  position_penalty_coeff: 10.0           # soft penalty for position limit breach
  drawdown_penalty_coeff: 5.0            # soft penalty for drawdown threshold breach

system:
  duckdb_path: data/db/market_data.ddb   # DuckDB: OHLCV, macro, quarantine, ingestion log
  sqlite_path: data/db/trading_ops.db    # SQLite: trades, positions, risk, events, alerts

alerting:
  alert_cooldown_minutes: 30               # minimum minutes between repeat alerts
  consecutive_failures_before_alert: 3     # failures before triggering alert
  alerts_webhook_url: ""                   # Discord webhook for critical/warning alerts
  daily_webhook_url: ""                    # Discord webhook for daily summary/info
  healthchecks_equity_url: ""              # Healthchecks.io equity cycle ping URL
  healthchecks_crypto_url: ""              # Healthchecks.io crypto cycle ping URL

scheduler:
  enabled: false                           # set true for live/paper trading; false during training-only
  apscheduler_db_path: db/apscheduler_jobs.sqlite  # SEPARATE from trading_ops.db
  misfire_grace_time: 300                  # seconds to tolerate late job execution
  max_workers: 4                           # APScheduler thread pool size

backup:
  sqlite_retention_days: 14         # days to keep SQLite backups
  duckdb_rotate: false              # rotate DuckDB snapshots (off in dev)
  backup_dir: backups/              # relative to repo root
  # offsite_host: ""                # rsync destination host (production only)
  # offsite_path: ""                # rsync destination path (production only)

shadow:
  equity_eval_days: 10              # trading days to evaluate shadow equity model
  crypto_eval_cycles: 30            # 4H cycles to evaluate shadow crypto model
  auto_promote: true                # auto-promote shadow if it beats active
  mdd_tolerance_ratio: 1.2          # shadow MDD must be <= active_MDD * ratio

sentiment:
  enabled: false                    # set true + install transformers to enable
  model_name: ProsusAI/finbert      # HuggingFace model for sentiment scoring
  max_headlines_per_asset: 10       # max news headlines per asset per cycle
  finnhub_api_key: ""               # OVERRIDE via SWINGRL_SENTIMENT__FINNHUB_API_KEY

security:
  key_rotation_days: 90             # reminder threshold for API key rotation
  env_file_permissions: "600"       # expected permissions on .env file

memory_agent:
  enabled: false                    # memory agent disabled by default — set true to enable
  meta_training: false              # LLM hyperparameter meta-training (disabled by default)
  base_url: "http://swingrl-memory:8889"
  api_key: ""                       # OVERRIDE via SWINGRL_MEMORY_AGENT__API_KEY in .env
  live_endpoints:
    obs_enrichment: false
    blend_weights: false
    position_advice: false
    trade_veto: false
    cycle_gate: false
    risk_thresholds: false
  cloud_block_on_429: true            # skip cloud providers that returned 429 today (resets daily UTC)
  cloud_block_codes: [429]            # HTTP status codes that trigger calendar-day blocking
  ollama_instances:
    - name: homelab
      url: "http://swingrl-ollama:11434"
      model: "qwen2.5:14b"
      timeout: 300
  # Epoch advice call frequency (fewer calls with smarter model = better than many garbage calls)
  epoch_cadence_ppo: 20                        # restored: ~4 calls/fold (was 60 → only 1.4/fold, 48% delivery failure)
  epoch_cadence_a2c: 8000                      # was 2000 → 4x fewer calls (~4 calls/fold)
  epoch_cadence_sac: 40000                     # was 10000 → 4x fewer calls (~4 calls/fold)
  epoch_cadence_default: 500                   # was 100
  # Control folds: fold indices that skip reward adjustments (scientific control group)
  # Empty list = all folds are treatment (backward compatible)
  control_folds_equity: [0, 5, 10, 15, 20]    # 5 control, ~18 treatment (spread across market regimes)
  control_folds_crypto: [0, 4, 9, 13]          # 4 control, ~10 treatment
  # Epoch aggregation parameters (used by consolidation to summarize epoch memories)
  outlier_iqr_mild: 1.5                     # Tukey mild fence multiplier for IQR outlier detection
  outlier_iqr_extreme: 3.0                  # Tukey extreme fence multiplier
  max_outlier_events: 3                     # max extreme events reported per metric per fold
  skewness_min_n: 8                         # min snapshots to compute skewness (unreliable below)
  confidence_n_low: 5                       # N <= this → "low" confidence label in fold summary
  confidence_n_high: 15                     # N >= this → "high" confidence label

  consolidation:
    provider: "mistral"                     # key into providers map (fast ~18s, openrouter as backup)
    model: ""                               # empty = use provider's default_model
    timeout_sec: 1800
    inter_phase_delay_sec: 60               # seconds between LLM calls to respect rate limits
    rate_limit_max_retries: 3               # max 429 retry attempts per provider
    rate_limit_backoff_base_sec: 30         # exponential backoff base (30, 60, 120s)
    min_confidence_for_advice: 0.4          # minimum confidence for patterns used in query advice
    max_patterns_per_merge: 2               # max patterns per dedup/merge LLM call
    providers:
      mistral:
        base_url: "https://api.mistral.ai/v1"
        api_key: ""                         # OVERRIDE via MISTRAL_API_KEY in .env
        default_model: "mistral-large-latest"
        timeout_sec: 600
        max_tokens: 128000
      openrouter:
        base_url: "https://openrouter.ai/api/v1"
        api_key: ""                         # OVERRIDE via OPENROUTER_API_KEY in .env
        default_model: "nvidia/nemotron-3-super-120b-a12b:free"
      gemini:
        base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
        api_key: ""                         # OVERRIDE via GEMINI_API_KEY in .env
        default_model: "gemini-2.5-flash"
        timeout_sec: 60
        max_tokens: 65536
      cerebras:
        base_url: "https://api.cerebras.ai/v1"
        api_key: ""                         # OVERRIDE via CEREBRAS_API_KEY in .env
        default_model: "qwen-3-235b-a22b-instruct-2507"
        timeout_sec: 30
        max_tokens: 65536
      groq:
        base_url: "https://api.groq.com/openai/v1"
        api_key: ""                         # OVERRIDE via GROQ_API_KEY in .env
        default_model: "meta-llama/llama-4-scout-17b-16e-instruct"
        timeout_sec: 30
        max_tokens: 8192                        # llama-4-scout hard limit; was 30000 (caused 400 on every call)
      nvidia:
        base_url: "https://integrate.api.nvidia.com/v1"
        api_key: ""                         # OVERRIDE via NVIDIA_API_KEY in .env
        default_model: "moonshotai/kimi-k2.5"

training:
  bounds:
    hyperparam_bounds:
      learning_rate: [0.00001, 0.001]
      entropy_coeff: [0.0, 0.05]
      clip_range: [0.1, 0.4]
      n_epochs: [3, 20]
      batch_size: [32, 512]
      gamma: [0.95, 0.995]
    reward_bounds:
      profit: [0.10, 0.70]
      sharpe: [0.10, 0.60]
      drawdown: [0.05, 0.50]
      turnover: [0.00, 0.20]
  sac_buffer_size: 200000           # SAC replay buffer. Was 500K; reduced per research (smaller=better for non-stationary)
  n_envs: 6                         # Parallel envs per training (SubprocVecEnv). 6 × 3 algo workers = 18 processes.
  vecenv_backend: subproc            # "subproc" for parallel SubprocVecEnv, "dummy" for sequential DummyVecEnv

features:
  equity_zscore_window: 252        # rolling z-score window for equity (trading days)
  crypto_zscore_window: 360        # rolling z-score window for crypto (4H bars ~60 days)
  equity_hmm_window: 1260          # HMM fitting window for equity (5 years daily)
  crypto_hmm_window: 2000          # HMM fitting window for crypto (4H bars ~1 year)
  hmm_n_iter: 200                  # max EM iterations per HMM fit
  hmm_n_inits: 5                   # random initializations, best log-likelihood wins
  hmm_ridge: 0.000001             # ridge regularization for HMM covariance stability
  correlation_threshold: 0.85      # Pearson r threshold for feature pruning
  zscore_epsilon: 0.00000001      # floor for rolling std to prevent division by zero
  equity_turbulence_warmup: 252    # expanding lookback warmup for equity turbulence
  crypto_turbulence_window: 1080   # rolling window for crypto turbulence (4H bars)
  crypto_turbulence_warmup: 360    # crypto turbulence minimum warmup bars
