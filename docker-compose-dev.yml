services:
  swingrl:
    container_name: swingrl-ci
    build:
      context: .
      target: ci
    # No mem_limit — swingrl is the primary workload on 64 GB homelab.
    # Let the OS manage memory; training peaks at ~12-15 GB.
    cpus: 8.0
    # Secrets: loaded from .env on the host; never baked into the image.
    # SECURITY: .env must be chmod 600 (owner read/write only).
    #   chmod 600 .env  # Run after any .env modification
    env_file: .env
    environment:
      - TZ=America/New_York
    # Bind mounts: data persists on the host across container restarts.
    # Paths match trader user's /app working directory inside the container.
    volumes:
      - ./data:/app/data
      - ./db:/app/db
      - ./models:/app/models
      - ./logs:/app/logs
      - ./status:/app/status
    restart: unless-stopped
    networks:
      - default
      - br0

networks:
  br0:
    external: true
